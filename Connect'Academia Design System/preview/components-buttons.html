<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Components — Buttons</title>
<link rel="stylesheet" href="_base.css" />
<style>
  body { padding: 32px; }
  .stage { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 22px; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .header p  { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

  .section { display: flex; flex-direction: column; gap: 12px; }
  .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.10em; color: var(--text-muted); }
  .row {
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    padding: 18px 20px;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 20px;
  }
  .row.dark { background: #1A1A1A; border-color: rgba(255,255,255,0.10); }

  /* Buttons */
  .btn {
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 0.01em;
    border: 0;
    cursor: pointer;
    padding: 14px 24px;
    border-radius: 999px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all 200ms cubic-bezier(.2,.8,.2,1);
  }
  .btn.primary { background: #8B52FA; color: #fff; box-shadow: 0 8px 24px rgba(139,82,250,0.30); }
  .btn.primary.hover { background: #9D6EFB; }
  .btn.primary.press { background: #7440D9; transform: scale(0.98); box-shadow: 0 4px 12px rgba(139,82,250,0.20); }
  .btn.primary.disabled { background: #C7B0F8; box-shadow: none; cursor: not-allowed; }
  .btn.secondary { background: transparent; color: #8B52FA; border: 1.5px solid #8B52FA; padding: 12.5px 22.5px; }
  .row.dark .btn.secondary { color: #B596FE; border-color: #B596FE; }
  .btn.tertiary { background: transparent; color: #8B52FA; padding: 14px 8px; }
  .btn.size-sm { padding: 8px 14px; font-size: 13px; }
  .btn.size-lg { padding: 18px 32px; font-size: 17px; }
  .btn.icon { width: 44px; height: 44px; padding: 0; justify-content: center; }
  .btn.icon-only { padding: 12px 14px; }

  .ico { width: 18px; height: 18px; }

  .state-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .state-cell {
    background: var(--bg-surface); border: 1px solid var(--border-subtle);
    border-radius: 16px;
    padding: 18px 14px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .state-cell .nm { font-size: 11px; font-weight: 700; color: var(--text-primary); }
  .state-cell .hx { font-family: ui-monospace, monospace; font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="stage">
    <div class="header">
      <span class="eyebrow">Composant — Boutons</span>
      <h1>Buttons</h1>
      <p>Pilule par défaut (radius 999px). Primary plein, Secondary outline, Tertiary texte. Texte en Medium 500 / 16px.</p>
    </div>

    <div class="section">
      <span class="label">Hiérarchie — Light Mode</span>
      <div class="row">
        <button class="btn primary">Continuer
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
        <button class="btn secondary">Plus tard</button>
        <button class="btn tertiary">Tout afficher →</button>
        <button class="btn primary icon" aria-label="Continue">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>

    <div class="section">
      <span class="label">Hiérarchie — Dark Mode</span>
      <div class="row dark">
        <button class="btn primary">Continuer</button>
        <button class="btn secondary">Plus tard</button>
        <button class="btn tertiary" style="color:#B596FE;">Tout afficher →</button>
      </div>
    </div>

    <div class="section">
      <span class="label">États du bouton primaire</span>
      <div class="state-grid">
        <div class="state-cell"><button class="btn primary">Valider</button><span class="nm">Default</span><span class="hx">#8B52FA</span></div>
        <div class="state-cell"><button class="btn primary hover">Valider</button><span class="nm">Hover</span><span class="hx">#9D6EFB</span></div>
        <div class="state-cell"><button class="btn primary press">Valider</button><span class="nm">Press · 98%</span><span class="hx">#7440D9</span></div>
        <div class="state-cell"><button class="btn primary disabled">Valider</button><span class="nm">Disabled</span><span class="hx">α 40%</span></div>
      </div>
    </div>

    <div class="section">
      <span class="label">Tailles</span>
      <div class="row">
        <button class="btn primary size-sm">SM · Filtrer</button>
        <button class="btn primary">MD · Continuer</button>
        <button class="btn primary size-lg">LG · S'inscrire</button>
      </div>
    </div>
  </div>
</body>
</html>
