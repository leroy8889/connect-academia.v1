<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Connect'Academia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="../../../assets/images/Logo 1 CA COMPLET.svg" type="image/svg+xml">
    <style>
        :root {
            --primary-color: #9b51e0;
            --bg-input: #f3f4f6;
            --text-main: #000000;
            --text-sub: #6b7280;
            --border-radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            height: 100%;
            background-color: #fff;
            overflow-x: hidden;
        }

        .main-container {
            display: flex;
            min-height: 100vh;
        }

        /* Section Gauche - Image */
        .image-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 48%;
            height: 100vh;
            background: url('../../../assets/images/Images409x610 - Page-inscription.png') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* Section Droite - Formulaire */
        .form-section {
            position: relative;
            flex: 1;
            margin-left: 55%;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            z-index: 2;
        }

        .form-content {
            width: 100%;
            max-width: 450px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo img {
            max-width: 150px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .step-text {
            color: var(--text-sub);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .subtitle {
            color: var(--text-sub);
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        label span {
            color: red;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--border-radius);
            border: none;
            background-color: var(--bg-input);
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            background-color: #e5e7eb;
        }

        input::placeholder {
            color: #9ca3af;
        }

        /* Password constraints grid */
        .password-constraints {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .constraint {
            font-size: 12px;
            color: #d1d5db;
            display: flex;
            align-items: center;
        }

        .constraint::before {
            content: "✕";
            margin-right: 5px;
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            font-size: 13px;
            color: var(--text-sub);
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Button */
        .btn-next {
            width: 100%;
            padding: 14px;
            background-color: #f3f4f6;
            color: #9ca3af;
            border: none;
            border-radius: var(--border-radius);
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-next:hover {
            background-color: #9b51e0;
            color: #ffffff;
        }

        .footer-links {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
        }

        .footer-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .copyright {
            color: var(--text-sub);
            font-size: 12px;
            margin-top: 10px;
        }

        

        /* Responsive */
        @media (max-width: 900px) {
            .image-section {
                display: none;
            }
            .form-section {
                margin-left: 0;
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Partie Gauche -->
        <div class="image-section"></div>

        <!-- Partie Droite -->
        <div class="form-section">
            <div class="form-content">
                <div class="logo">
                    <img src="../../../assets/images/logo1.jpeg" alt="Logo Connect'Academia">
                </div>

                
                <h1>Renseignez vos informations personnelles</h1>
                <p class="subtitle">Veuillez remplir tous les champs obligatoires pour continuer.</p>

                <form>
                    <div class="form-group">
                        <label>Nom <span>*</span></label>
                        <input type="text" placeholder="Entrez votre nom" required>
                    </div>

                    <div class="form-group">
                        <label>Prénom <span>*</span></label>
                        <input type="text" placeholder="Entrez votre prénom" required>
                    </div>

                    <div class="form-group">
                        <label>Email <span>*</span></label>
                        <input type="email" placeholder="Entrez votre adresse email" required>
                    </div>


                    <div class="form-group">
                        <label>Niveau <span>*</span></label>
                        <input type="text" value="Terminale" readonly style="background-color: #e5e7eb; cursor: not-allowed;">
                    </div>

                    <div class="form-group">
                        <label>Série <span>*</span></label>
                        <select required>
                            <option value="" disabled selected>Sélectionnez votre série</option>
                            <option value="S">Série B - Economie</option>
                            <option value="L">Série A1 - Littéraire</option>
                            <option value="ES">Série A2 - Littéraire</option>
                            <option value="STMG">Série D - Scientifique</option>
                            <option value="STMG">Série C - Scientifique</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Mot de passe <span>*</span></label>
                        <input type="password" placeholder="Entrez votre mot de passe" required>
                    </div>

                   

                    <div class="password-constraints">
                        <div class="constraint">8 caractères min.</div>
                        <div class="constraint">1 chiffre</div>
                        <div class="constraint">1 lettre min. et maj.</div>
                        <div class="constraint">1 caractère spécial</div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="terms">
                        <label for="terms" style="margin-bottom: 0;">J'accepte les conditions d'utilisation</label>
                    </div>

                    <button type="submit" class="btn-next">Suivant</button>
                </form>

                <div class="footer-links">
                    <p>Déjà membre ? <a href="login.html">Se connecter</a></p>
                    <p class="copyright">Tous droits réservés - Connect'Academia</p>
                </div>
            </div>
        </div>
    </div>

    

</body>
</html>
